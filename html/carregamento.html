<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela de Carregamento</title>
    <link rel="stylesheet" href="carregamento.css"> 
</head>
<body>
    
    <div class="carregando">
        <span class="pontos"></span>
        <span class="pontos"></span>
        <span class="pontos"></span>
    </div>

    <div class="conteudo">
        <h1 style="color: white;">Conteúdo do Site Carregado!</h1>
    </div>
    
    <script>
        window.addEventListener("load", function(){
            const telaCarregamento = document.querySelector(".carregando");
            
            telaCarregamento.style.transition = "opacity 0.8s";
            telaCarregamento.style.opacity = "0";
            setTimeout(() => {
                telaCarregamento.style.display = "none";
            }, 800);
        });
    </script>
</body>
</html>
