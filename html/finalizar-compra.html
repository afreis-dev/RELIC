<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Finalizar compra - RELIC</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <header class="topo">
    <div class="logo">RELIC</div>

    <nav class="menu">
      <a href="vinil.html">Vinil</a>
      <a href="cartas.html">Cartas</a>
      <a href="livros.html">Livros</a>
      <a href="jogos.html">Jogos</a>
    </nav>

    <div class="acoes-topo">
      <input type="text" placeholder="Pesquisar produto">
      <a href="carrinho.html">Carrinho</a>
      <a href="entra.html">Entrar</a>
    </div>
  </header>

  <main class="checkout-container">
    <section class="checkout-form">
      <span class="tag">Checkout</span>
      <h1>Finalizar compra</h1>

      <form>
        <div class="bloco">
          <h2>Informações pessoais</h2>

          <div class="linha">
            <div class="campo">
              <label for="nome">Nome completo</label>
              <input type="text" id="nome" placeholder="Digite seu nome">
            </div>

            <div class="campo">
              <label for="cpf">CPF</label>
              <input type="text" id="cpf" placeholder="000.000.000-00">
            </div>
          </div>

          <div class="linha">
            <div class="campo">
              <label for="email">E-mail</label>
              <input type="email" id="email" placeholder="seuemail@email.com">
            </div>

            <div class="campo">
              <label for="telefone">Telefone</label>
              <input type="text" id="telefone" placeholder="(00) 00000-0000">
            </div>
          </div>
        </div>

        <div class="bloco">
          <h2>Endereço de entrega</h2>

          <div class="linha">
            <div class="campo">
              <label for="cep">CEP</label>
              <input type="text" id="cep" placeholder="00000-000">
            </div>

            <div class="campo campo-grande">
              <label for="rua">Rua</label>
              <input type="text" id="rua" placeholder="Nome da rua">
            </div>
          </div>

          <div class="linha">
            <div class="campo">
              <label for="numero">Número</label>
              <input type="text" id="numero" placeholder="123">
            </div>

            <div class="campo">
              <label for="bairro">Bairro</label>
              <input type="text" id="bairro" placeholder="Seu bairro">
            </div>

            <div class="campo">
              <label for="cidade">Cidade</label>
              <input type="text" id="cidade" placeholder="Sua cidade">
            </div>
          </div>

          <div class="linha">
            <div class="campo">
              <label for="estado">Estado</label>
              <input type="text" id="estado" placeholder="UF">
            </div>

            <div class="campo campo-grande">
              <label for="complemento">Complemento</label>
              <input type="text" id="complemento" placeholder="Apartamento, bloco, referência...">
            </div>
          </div>
        </div>

        <div class="bloco">
          <h2>Pagamento</h2>

          <div class="linha radios">
            <label><input type="radio" name="pagamento" checked> Cartão de crédito</label>
            <label><input type="radio" name="pagamento"> Pix</label>
            <label><input type="radio" name="pagamento"> Boleto</label>
          </div>

          <div class="linha">
            <div class="campo">
              <label for="cartao">Número do cartão</label>
              <input type="text" id="cartao" placeholder="0000 0000 0000 0000">
            </div>
          </div>

          <div class="linha">
            <div class="campo">
              <label for="validade">Validade</label>
              <input type="text" id="validade" placeholder="MM/AA">
            </div>

            <div class="campo">
              <label for="cvv">CVV</label>
              <input type="text" id="cvv" placeholder="123">
            </div>

            <div class="campo campo-grande">
              <label for="titular">Nome do titular</label>
              <input type="text" id="titular" placeholder="Nome no cartão">
            </div>
          </div>
        </div>
      </form>
    </section>

            <aside class="resumo-pedido">
            <h2>Resumo do pedido</h2>

            <div id="lista-resumo"></div>

            <div class="linha-resumo">
                <p>Subtotal</p>
                <span id="subtotal">R$ 0,00</span>
            </div>

            <div class="linha-resumo">
                <p>Frete</p>
                <span id="frete">R$ 25,00</span>
            </div>

            <div class="linha-resumo total">
                <p>Total</p>
                <span id="total">R$ 0,00</span>
            </div>

            <button class="btn-confirmar">Confirmar pedido</button>
            <a href="carrinho.html" class="voltar">Voltar ao carrinho</a>
            </aside>
