<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/style.css">
    <title>Carrinho | Relic</title>
</head>
<body>
    <header class="header">
        <nav class="barNavegacao">
            <a href="../index.html" class="logo">RELIC</a>
            <a href="./vinil.html">Vinil</a>
            <a href="./cartas.html" class="ativo">Cartas</a>
            <a href="./livros.html">Livros</a>
            <a href="./jogos.html">Jogos</a>
            <input type="search" name="pesquisa" id="pesquisa" placeholder="Buscar item raro">
            <a href="./entra.html">Entrar</a>
        </nav>
    </header>

    <main class="carrinho-container">

    <h1>Seu Carrinho</h1>

    <div class="lista-carrinho">

        <div class="item-carrinho">
            <img src="../assets/arianavinil.png" alt="Vinil Ariana Grande">

            <div class="info">
                <h3>Vinil Ariana Grande</h3>
                <p>Álbum em vinil edição especial.</p>
                <span>R$ 120,00</span>
            </div>

            <button class="remover">Remover</button>
        </div>

        <div class="item-carrinho">
            <img src="..\assets\Game-Boy sem fundo branco.png" alt="Nintendo Game Boy">

            <div class="info">
                <h3>Nintendo Game Boy</h3>
                <p>Nintendo Game Boy retro</p>
                <span>R$ 400,00</span>
            </div>

            <button class="remover">Remover</button>
        </div>

    </div>

    <div class="total">
        <h2>Total: R$ 520,00</h2>
        <button class="finalizar">Finalizar Compra</button>
    </div>

</main>
</body>
</html>
